name: Auth Service CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  GO_VERSION: '1.25'
  SERVICE_PATH: Auth_Service

jobs:
  test:
    name: Test Auth Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.SERVICE_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.SERVICE_PATH }}/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          cat > ${{ env.SERVICE_PATH }}/.env <<EOF
          JWT_KEY_ID=main-key
          JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
          DB_PASSWORD=qwerty
          DB_USERNAME=postgres
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=authdb
          SSLMODE=disable
          DATABASE_URL=postgres://postgres:qwerty@postgres:5432/authdb?sslmode=disable
          SMTP_HOST=mailhog
          SMTP_PORT=1025
          SMTP_USERNAME=
          SMTP_PASSWORD=
          SMTP_FROM_EMAIL=no-reply@example.local
          SMTP_FROM_NAME=Auth_Service
          FRONTEND_BASE_URL=http://localhost:5173
          SMTP_USE_TLS=false
          SMTP_USE_STARTTLS=false
          EOF

      - name: Build Docker image
        run: docker build -t auth-service:ci ./${{ env.SERVICE_PATH }}