services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_ADDR: ":8080"
      AUTH_SERVICE_ADDR: "host.docker.internal:50051"
      JWT_PUBLIC_KEY_PATH: "/app/keys/public.pem"
      JWT_ISSUER: "auth-jwt"
      JWT_AUDIENCE: "api-gateway"
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    restart: unless-stopped